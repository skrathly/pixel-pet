<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: transparent; width: 100%; height: 100%; cursor: default; }
    #stage { display: block; width: 100vw; height: 100vh; }

    /* Pantalla de trabajo: lluvia Matrix de fondo + tarea encima */
    .screen {
      position: fixed; display: none; left: 0; top: 0; z-index: 10; pointer-events: none;
      border: 1px solid #1d3a26; border-radius: 5px; overflow: hidden;
      background: #02050a; box-shadow: 0 3px 12px rgba(0,0,0,0.4);
      width: 150px; height: 56px;
    }
    .screen canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .screen-overlay {
      position: absolute; inset: 0; padding: 5px 7px;
      font: 10px/1.35 "Cascadia Code", "Consolas", ui-monospace, monospace;
      display: flex; flex-direction: column; justify-content: space-between;
      text-shadow: 0 0 4px #000, 0 0 4px #000;
    }
    .screen-head { color: #6effa0; font-size: 9px; letter-spacing: .3px; }
    .screen-body { color: #d6ffe6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .screen-body .prompt { color: #6effa0; }
    .screen-body .cursor { color: #d6ffe6; animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .screen::after { content:''; position:absolute; left:50%; bottom:-6px; transform:translateX(-50%);
      border-left:6px solid transparent; border-right:6px solid transparent; border-top:6px solid #02050a; }

    /* Globito de saludo */
    .hi {
      position: fixed; display: none; left: 0; top: 0; z-index: 11; pointer-events: none;
      background: #fffceb; border: 1px solid #e0c873; border-radius: 10px;
      padding: 2px 7px; font: 11px/1.2 -apple-system, "Segoe UI", sans-serif; color: #6b5a1e;
      box-shadow: 0 2px 5px rgba(0,0,0,0.18); white-space: nowrap;
    }
    .hi::after { content:''; position:absolute; left:50%; bottom:-5px; transform:translateX(-50%);
      border-left:5px solid transparent; border-right:5px solid transparent; border-top:5px solid #fffceb; }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <script src="renderer.js"></script>
</body>
</html>
